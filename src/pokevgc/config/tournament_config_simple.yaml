# Tournament configuration
# All agents battle each other a configurable number of times

tournament:
  agents:
    - "GreedyBattlePolicy"
    - "RandomBattlePolicy"
  
  battles_per_matchup: 3
  n_active: 2
  team_size: 4
  n_moves: 4
  
  stats_file: "tournament_stats.csv"
  dataset_file: "tournament_dataset.csv"
  verbose: false
